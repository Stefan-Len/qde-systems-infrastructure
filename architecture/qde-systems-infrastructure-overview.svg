<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="640" viewBox="0 0 1500 640" role="img" aria-labelledby="title desc">
  <title id="title">QDE-Systems Infrastructure public validation and boundary flow</title>
  <desc id="desc">Synthetic input flows through candidate validation, deterministic ordering, a risk gate, portfolio summary, audit trail, and a non-broker execution boundary.</desc>
  <rect width="1500" height="640" fill="#0b1117"/>
  <style>
    .box { fill:#232323; stroke:#8b8b8b; stroke-width:1.8; rx:0; }
    .boundary { fill:#181f27; stroke:#9ca3af; stroke-width:1.8; rx:0; }
    .label { fill:#f3f4f6; font-family:Inter,Arial,sans-serif; font-size:22px; font-weight:700; }
    .small { fill:#d1d5db; font-family:Inter,Arial,sans-serif; font-size:16px; font-weight:600; }
    .line { fill:none; stroke:#c8c8c8; stroke-width:1.7; }
    .tag { fill:#62666d; }
  </style>

  <text x="70" y="62" class="label" font-size="30">QDE-Systems Infrastructure</text>
  <text x="70" y="95" class="small">Public synthetic validation harness - not private strategy logic, not broker execution</text>

  <rect class="box" x="80" y="255" width="220" height="74"/>
  <text class="label" x="116" y="300">Synthetic Input</text>

  <rect class="box" x="370" y="180" width="220" height="74"/>
  <text class="label" x="415" y="225">Candidate Set</text>

  <rect class="box" x="370" y="330" width="220" height="74"/>
  <text class="label" x="429" y="375">Audit Trail</text>

  <rect class="box" x="660" y="255" width="230" height="74"/>
  <text class="label" x="690" y="300">Deterministic Order</text>

  <rect class="box" x="950" y="255" width="190" height="74"/>
  <text class="label" x="1003" y="300">Risk Gate</text>

  <rect class="box" x="1230" y="135" width="200" height="74"/>
  <text class="label" x="1287" y="180">Rejected</text>

  <rect class="box" x="1230" y="255" width="200" height="74"/>
  <text class="label" x="1294" y="300">Blocked</text>

  <rect class="box" x="1230" y="375" width="200" height="74"/>
  <text class="label" x="1290" y="420">Accepted</text>

  <rect class="boundary" x="1190" y="510" width="240" height="84"/>
  <text class="label" x="1220" y="549">Execution Boundary</text>
  <text class="small" x="1246" y="573">no broker adapter</text>

  <rect class="box" x="660" y="500" width="230" height="74"/>
  <text class="label" x="687" y="545">Portfolio Summary</text>

  <rect class="box" x="930" y="500" width="230" height="74"/>
  <text class="label" x="965" y="545">Validation Result</text>

