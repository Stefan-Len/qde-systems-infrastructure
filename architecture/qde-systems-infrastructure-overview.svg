  <path class="line" d="M300 292 C330 292 340 367 370 367"/>
  <path class="line" d="M590 217 C625 217 625 292 660 292"/>
  <path class="line" d="M590 367 C625 367 625 292 660 292"/>

  <path class="line" d="M890 292 C915 292 925 292 950 292"/>

  <path class="line" d="M1140 292 C1170 292 1175 172 1230 172"/>
  <path class="line" d="M1140 292 C1170 292 1175 292 1230 292"/>
  <path class="line" d="M1140 292 C1170 292 1175 412 1230 412"/>

