<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" role="img" aria-labelledby="title desc">
  <title id="title">Deterministic execution infrastructure architecture</title>
  <desc id="desc">Fixed architecture diagram with the same node layout as the README Mermaid diagram, using connector lines without arrowheads.</desc>
